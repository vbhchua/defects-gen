# Local-development values preserved from the former quick-start install path.
# Use with:
#   helm upgrade --install osmo osmo/service -f quick-start-values.yaml

global:
  osmoImageLocation: nvcr.io/nvidia/osmo
  osmoImageTag: latest
  imagePullSecret: null
  hostname: quick-start.osmo
  nodeSelector:
    node_group: service

services:
  configFile:
    enabled: true

  postgres:
    enabled: true
    imagePullPolicy: IfNotPresent
    storageClassName: standard
    password: "osmo"
    nodeSelector:
      node_group: data

  redis:
    enabled: true
    imagePullPolicy: IfNotPresent
    storageClassName: standard
    tlsEnabled: false
    nodeSelector:
      node_group: data

  # localstack replaced by MinIO (osmo-values/minio.yaml, plain kubectl apply):
  # localstack-persist corrupts concurrent multipart uploads (NoSuchUpload /
  # missing part files) and loses buckets on host restart. MinIO stores data on
  # the data node at /var/lib/minio (host 1 TB volume), creds test/testtest.
  localstackS3:
    enabled: false

  defaultAdmin:
    enabled: true
    username: backend-operator
    passwordSecretName: backend-operator-password
    passwordSecretKey: password

  configs:
    enabled: true
    service:
      service_base_url: http://quick-start.osmo
    workflow:
      workflow_data:
        credential:
          endpoint: s3://osmo/workflows
          override_url: http://minio.osmo:9000
          access_key_id: test
          access_key: testtest
          region: us-east-1
      workflow_log:
        credential:
          endpoint: s3://osmo/workflows
          override_url: http://minio.osmo:9000
          access_key_id: test
          access_key: testtest
          region: us-east-1
      workflow_app:
        credential:
          endpoint: s3://osmo/apps
          override_url: http://minio.osmo:9000
          access_key_id: test
          access_key: testtest
          region: us-east-1
      backend_images:
        init: nvcr.io/nvidia/osmo/init-container:latest
        client: nvcr.io/nvidia/osmo/client:latest
      credential_config:
        disable_data_validation: ["s3"]
    podTemplates:
      default_compute:
        spec:
          containers:
          # Workflow task pods talk to the in-cluster S3 (MinIO) for input/output
          # data. Unlike the service deployment, they get NO S3 env by default, so
          # boto3 falls back to virtual-hosted addressing (bucket.minio.osmo) which
          # does not resolve → ctrl's "Validating WRITE access" step retries the 24h
          # S3 timeout, leaks memory, and OOMs before the task ever starts. Force the
          # endpoint + path-style addressing on both containers.
          - name: "{{USER_CONTAINER_NAME}}"
            env:
            - name: OSMO_LOGIN_DEV
              value: "true"
            - name: AWS_ENDPOINT_URL_S3
              value: http://minio.osmo:9000
            - name: AWS_S3_FORCE_PATH_STYLE
              value: "true"
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          - name: osmo-ctrl
            env:
            - name: OSMO_LOGIN_DEV
              value: "true"
            - name: AWS_ENDPOINT_URL_S3
              value: http://minio.osmo:9000
            - name: AWS_S3_FORCE_PATH_STYLE
              value: "true"
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          nodeSelector:
            node_group: compute
      # DIG (defect-image-generation) GPU workloads require two node-level mounts
      # on the user container: the OptiX denoiser binary (nvoptix.bin, present on
      # the compute node) and a >=16 GiB /dev/shm for Kit ray-tracer buffers and
      # torchrun shared memory. This deployment manages POD_TEMPLATE via ConfigMap,
      # so these must live in values (not `osmo config update`). Full container
      # spec is repeated because Helm replaces list values rather than merging.
      default_user:
        spec:
          containers:
          - name: "{{USER_CONTAINER_NAME}}"
            resources:
              limits:
                cpu: "{{USER_CPU}}"
                ephemeral-storage: "{{USER_STORAGE}}"
                memory: "{{USER_MEMORY}}"
                nvidia.com/gpu: "{{USER_GPU}}"
              requests:
                cpu: "{{USER_CPU}}"
                ephemeral-storage: "{{USER_STORAGE}}"
                memory: "{{USER_MEMORY}}"
                nvidia.com/gpu: "{{USER_GPU}}"
            volumeMounts:
            - name: nvoptix
              mountPath: /usr/share/nvidia/nvoptix.bin
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          volumes:
          - name: nvoptix
            hostPath:
              path: /usr/share/nvidia/nvoptix.bin
              type: File
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
    pools:
      default:
        description: "Default pool"
        backend: default
        common_pod_template:
        - default_ctrl
        - default_user
        - default_compute
        platforms:
          default: {}

  service:
    imagePullPolicy: IfNotPresent
    scaling:
      minReplicas: 1
      maxReplicas: 1
    extraEnv:
    - name: AWS_ENDPOINT_URL_S3
      value: http://minio.osmo:9000
    - name: AWS_S3_FORCE_PATH_STYLE
      value: "true"
    - name: AWS_DEFAULT_REGION
      value: us-east-1

  worker:
    imagePullPolicy: IfNotPresent
    scaling:
      minReplicas: 1
      maxReplicas: 1
    extraEnv:
    - name: AWS_ENDPOINT_URL_S3
      value: http://minio.osmo:9000
    - name: AWS_S3_FORCE_PATH_STYLE
      value: "true"
    - name: AWS_DEFAULT_REGION
      value: us-east-1

  logger:
    imagePullPolicy: IfNotPresent
    scaling:
      minReplicas: 1
      maxReplicas: 1
    extraEnv:
    - name: AWS_ENDPOINT_URL_S3
      value: http://minio.osmo:9000
    - name: AWS_S3_FORCE_PATH_STYLE
      value: "true"
    - name: AWS_DEFAULT_REGION
      value: us-east-1

  agent:
    imagePullPolicy: IfNotPresent
    scaling:
      minReplicas: 1
      maxReplicas: 1
    extraEnv:
    - name: AWS_ENDPOINT_URL_S3
      value: http://minio.osmo:9000
    - name: AWS_S3_FORCE_PATH_STYLE
      value: "true"
    - name: AWS_DEFAULT_REGION
      value: us-east-1

  delayedJobMonitor:
    imagePullPolicy: IfNotPresent

  ui:
    enabled: true
    imagePullPolicy: IfNotPresent
    apiHostname: quick-start.osmo.svc.cluster.local:80
    nextjsSslEnabled: false

  router:
    imagePullPolicy: IfNotPresent
    scaling:
      minReplicas: 1
      maxReplicas: 1

podMonitor:
  enabled: false

gateway:
  name: quick-start
  envoy:
    scaling:
      minReplicas: 1
      maxReplicas: 1
    nodeSelector:
      node_group: service
    service:
      type: NodePort
      nodePort: 30080
      httpsPort: null
    defaultIdentity:
      user: testuser
      roles: osmo-admin
      allowedPools: default
  oauth2Proxy:
    enabled: false
  authz:
    enabled: false
