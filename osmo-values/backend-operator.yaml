# Local-development values preserved from the former quick-start install path.
# Install after the service chart has created the backend-operator admin user.

global:
  osmoImageLocation: nvcr.io/nvidia/osmo
  osmoImageTag: latest
  imagePullSecret: null
  serviceUrl: http://quick-start.osmo.svc.cluster.local
  agentNamespace: osmo
  backendNamespace: default
  backendTestNamespace: osmo-test
  backendName: default
  accountUsername: backend-operator
  accountPasswordSecret: backend-operator-password
  accountPasswordSecretKey: password
  # This local deployment has no identity provider (authz/oauth2Proxy disabled,
  # envoy defaultIdentity injects identity), so OSMO advertises no OAuth2
  # token_endpoint and the OAuth2 password grant cannot work. Use OSMO-native
  # access-token login instead, which hits <serviceUrl>/api/auth/jwt/access_token
  # and keeps in-cluster Kubernetes config (unlike --method dev, which forces a
  # local kubeconfig). See README.md.
  loginMethod: token
  accountTokenSecret: backend-operator-token
  accountTokenSecretKey: token
  nodeSelector:
    node_group: service

services:
  backendListener:
    imagePullPolicy: IfNotPresent
    initContainers:
    - name: wait-for-gateway
      image: busybox:1.37.0
      command:
      - sh
      - -c
      - |
        until nc -z quick-start 80; do
          echo "Waiting for quick-start..."
          sleep 2
        done
        echo "OSMO gateway is ready"
    resources:
      requests:
        cpu: "125m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

  backendWorker:
    imagePullPolicy: IfNotPresent
    initContainers:
    - name: wait-for-gateway
      image: busybox:1.37.0
      command:
      - sh
      - -c
      - |
        until nc -z quick-start 80; do
          echo "Waiting for quick-start..."
          sleep 2
        done
        echo "OSMO gateway is ready"
    resources:
      requests:
        cpu: "125m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

podMonitor:
  enabled: false

backendTestRunner:
  enabled: false
